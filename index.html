<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1612" />
<title>Lectio · Bible Audio Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Nanum+Myeongjo:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #1a1612;
    --bg-soft: #221d18;
    --bg-card: #2a241e;
    --text: #f4ede0;
    --text-soft: #d8cdb8;
    --text-faint: #a89c87;
    --rule: #4a4239;
    --accent: #e8a85c;
    --accent-deep: #c98a3a;
    --highlight: #ffd54a;
    --highlight-soft: rgba(255, 213, 74, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', 'Nanum Myeongjo', serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }

  body {
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top, rgba(232,168,92,0.05), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(232,168,92,0.03), transparent 60%);
  }

  *:focus-visible {
    outline: 3px solid var(--highlight);
    outline-offset: 3px;
  }

  .app {
    max-width: 1000px;
    margin: 0 auto;
    padding: 28px 16px 200px;
  }
  @media (min-width: 600px) { .app { padding: 36px 24px 200px; } }

  /* ── Masthead ─────────────────────────────────────── */
  .masthead {
    text-align: center;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
  }
  .ornament {
    color: var(--accent);
    letter-spacing: 0.6em;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(40px, 9vw, 72px);
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .subtitle {
    font-style: italic;
    color: var(--text-soft);
    margin-top: 10px;
    font-size: clamp(15px, 4vw, 21px);
  }
  .subtitle .ko {
    font-family: 'Nanum Myeongjo', serif;
    font-style: normal;
    margin-left: 6px;
  }

  /* ── Controls panel ───────────────────────────────── */
  .controls {
    margin-top: 24px;
    background: var(--bg-card);
    border: 1px solid var(--rule);
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (min-width: 760px) {
    .controls { grid-template-columns: auto 1.6fr 1fr 1fr auto; align-items: end; padding: 22px; gap: 18px; }
  }

  .field { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text);
  }
  .field select,
  .field input {
    background: var(--bg-soft);
    border: 2px solid var(--rule);
    padding: 14px 14px;
    font-family: 'Cormorant Garamond', 'Nanum Myeongjo', serif;
    font-size: 19px;
    color: var(--text);
    outline: none;
    cursor: pointer;
    min-height: 54px;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
  }
  .field select {
    color-scheme: dark;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23e8a85c' fill='none' stroke-width='2'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 38px;
  }
  .field input { cursor: text; }
  .field select:focus, .field input:focus { border-color: var(--accent); }

  .lang-toggle {
    display: flex;
    border: 2px solid var(--rule);
  }
  .lang-toggle button {
    flex: 1;
    background: var(--bg-soft);
    border: none;
    padding: 14px 12px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    letter-spacing: 0.06em;
    color: var(--text-soft);
    cursor: pointer;
    min-height: 54px;
    font-weight: 500;
  }
  .lang-toggle button.active {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }
  .lang-toggle button:nth-child(2) { font-family: 'Nanum Myeongjo', serif; }

  .load-btn {
    background: var(--accent);
    color: var(--bg);
    border: 2px solid var(--accent);
    padding: 14px 24px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    cursor: pointer;
    min-height: 54px;
    align-self: end;
    grid-column: 1 / -1;
  }
  @media (min-width: 760px) { .load-btn { grid-column: auto; } }
  .load-btn:hover, .load-btn:active { background: var(--accent-deep); border-color: var(--accent-deep); }

  optgroup {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    background: var(--bg);
  }
  optgroup option {
    font-family: 'Cormorant Garamond', 'Nanum Myeongjo', serif;
    font-weight: 500;
    font-size: 18px;
    color: var(--text);
    background: var(--bg-soft);
  }

  /* ── Settings row ──────────────────────────────────── */
  .settings {
    margin-top: 14px;
    padding: 14px 16px;
    background: var(--bg-soft);
    border: 1px solid var(--rule);
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }
  @media (min-width: 600px) { .settings { padding: 18px 22px; gap: 24px; } }

  .settings .field { flex-direction: row; align-items: center; gap: 10px; }
  .settings label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text);
  }

  .voice-toggle { display: flex; border: 2px solid var(--rule); }
  .voice-toggle button {
    background: var(--bg-card);
    border: none;
    padding: 10px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    min-height: 46px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .voice-toggle button.active { background: var(--accent); color: var(--bg); }
  .voice-toggle svg { width: 16px; height: 16px; }

  .test-btn {
    background: var(--bg-card);
    border: 2px solid var(--rule);
    color: var(--text-soft);
    padding: 8px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    min-height: 46px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .test-btn:hover, .test-btn:active { border-color: var(--accent); color: var(--accent); }
  .test-btn svg { width: 14px; height: 14px; }

  .size-btns { display: flex; gap: 6px; }
  .size-btn {
    background: var(--bg-card);
    border: 2px solid var(--rule);
    color: var(--text-soft);
    padding: 4px 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    cursor: pointer;
    min-height: 46px;
    min-width: 46px;
  }
  .size-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* ── Reading area ─────────────────────────────────── */
  .reading {
    margin-top: 32px;
    min-height: 280px;
  }

  .passage-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 12px;
    margin-bottom: 22px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .passage-title {
    font-size: clamp(26px, 6vw, 40px);
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
  }
  .passage-title.ko { font-family: 'Nanum Myeongjo', serif; font-weight: 700; }
  .passage-meta {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-faint);
  }
  .fullscreen-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 11px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    cursor: pointer;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .fullscreen-btn:hover, .fullscreen-btn:active { background: var(--accent-deep); }
  .fullscreen-btn svg { width: 14px; height: 14px; }

  .verses {
    font-size: var(--reading-size, 22px);
    line-height: 1.7;
    color: var(--text);
  }
  .verses.ko {
    font-family: 'Nanum Myeongjo', serif;
    font-size: calc(var(--reading-size, 22px) - 2px);
    line-height: 2;
  }

  .verse {
    margin-bottom: 12px;
    padding: 10px 14px;
    transition: background 0.3s;
    cursor: pointer;
    border-left: 4px solid transparent;
  }
  .verse:hover { background: rgba(232,168,92,0.08); }
  .verse.active {
    background: var(--highlight-soft);
    border-left-color: var(--highlight);
  }
  .verse-num {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    vertical-align: super;
    margin-right: 6px;
  }

  .empty {
    text-align: center;
    padding: 60px 16px;
    color: var(--text-soft);
    font-style: italic;
    font-size: 19px;
  }
  .empty .ornament-lg {
    color: var(--accent);
    font-size: 28px;
    margin-bottom: 14px;
    letter-spacing: 0.5em;
  }
  .loading {
    text-align: center;
    padding: 50px 16px;
    color: var(--text-soft);
    font-style: italic;
    font-size: 18px;
  }

  .info-note {
    margin-top: 14px;
    padding: 12px 16px;
    border: 2px solid var(--accent);
    background: rgba(232,168,92,0.08);
    color: var(--text);
    font-size: 15px;
    text-align: center;
  }

  /* ── Player bar ───────────────────────────────────── */
  .player {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #0e0b08;
    color: var(--text);
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    z-index: 50;
    flex-wrap: wrap;
    border-top: 1px solid var(--rule);
  }
  @media (min-width: 600px) { .player { padding: 16px 24px calc(16px + env(safe-area-inset-bottom)); gap: 16px; } }

  .player.visible { transform: translateY(0); }

  .player-info {
    flex: 1 1 100%;
    min-width: 0;
    text-align: center;
    order: -1;
  }
  @media (min-width: 600px) { .player-info { flex: 1; text-align: left; order: 0; } }

  .player-passage {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @media (min-width: 600px) { .player-passage { font-size: 19px; } }

  .player-passage.ko { font-family: 'Nanum Myeongjo', serif; font-weight: 700; }
  .player-status {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-faint);
    margin-top: 3px;
  }

  .player-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 0 auto;
    flex-wrap: nowrap;
  }
  @media (min-width: 600px) { .player-controls { gap: 10px; margin: 0; } }

  .player-btn {
    background: transparent;
    border: 2px solid var(--rule);
    color: var(--text);
    width: 48px; height: 48px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  @media (min-width: 600px) { .player-btn { width: 56px; height: 56px; } }

  .player-btn:hover, .player-btn:active { background: rgba(232,168,92,0.12); border-color: var(--accent); }
  .player-btn.primary {
    width: 60px; height: 60px;
    background: var(--accent);
    color: var(--bg);
    border: none;
  }
  @media (min-width: 600px) { .player-btn.primary { width: 68px; height: 68px; } }

  .player-btn.primary:hover, .player-btn.primary:active { background: var(--highlight); }
  .player-btn svg { width: 20px; height: 20px; }
  .player-btn.primary svg { width: 24px; height: 24px; }
  @media (min-width: 600px) {
    .player-btn svg { width: 22px; height: 22px; }
    .player-btn.primary svg { width: 28px; height: 28px; }
  }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1 1 100%;
    padding-top: 10px;
    margin-top: 4px;
    border-top: 1px solid var(--rule);
    justify-content: center;
  }
  @media (min-width: 760px) {
    .speed-control { flex: 0 0 auto; padding-top: 0; padding-left: 16px; margin-top: 0; margin-left: 6px; border-top: none; border-left: 1px solid var(--rule); justify-content: flex-start; }
  }

  .speed-control label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-faint);
  }
  .speed-control input { flex: 1; max-width: 200px; accent-color: var(--accent); height: 30px; }
  .speed-val {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    min-width: 44px;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
  }

  /* ── Fullscreen reading mode ─────────────────────── */
  .karaoke {
    position: fixed;
    inset: 0;
    background: #0e0b08;
    color: var(--text);
    z-index: 100;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .karaoke.active { display: flex; }
  body.karaoke-open { overflow: hidden; }

  .karaoke-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 16px calc(160px + env(safe-area-inset-bottom));
    min-height: 100%;
  }
  @media (min-width: 600px) { .karaoke-inner { padding: 40px 20px calc(180px + env(safe-area-inset-bottom)); } }

  .karaoke-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto 24px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: #0e0b08;
    padding-top: 14px;
    margin-top: -14px;
    z-index: 5;
  }
  .karaoke-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .karaoke-title.ko { font-family: 'Nanum Myeongjo', serif; font-weight: 700; }
  .karaoke-close {
    background: transparent;
    border: 2px solid var(--rule);
    color: var(--text);
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    cursor: pointer;
    min-height: 46px;
  }
  .karaoke-close:hover, .karaoke-close:active { background: rgba(232,168,92,0.12); border-color: var(--accent); }

  .karaoke-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 4px;
  }

  /* Fullscreen size scales with same --reading-size variable
     but with a sensible maximum so it never overflows mobile screens. */
  .karaoke-prev, .karaoke-next {
    font-family: 'Cormorant Garamond', 'Nanum Myeongjo', serif;
    font-size: clamp(16px, calc(var(--reading-size, 22px) * 1.1), 32px);
    line-height: 1.5;
    color: rgba(244,237,224,0.35);
    max-width: 900px;
    margin-bottom: 24px;
    transition: opacity 0.4s;
  }
  .karaoke-next { margin-top: 24px; margin-bottom: 0; }
  .karaoke-current {
    font-family: 'Cormorant Garamond', 'Nanum Myeongjo', serif;
    font-size: clamp(28px, calc(var(--reading-size, 22px) * 1.8), 64px);
    line-height: 1.35;
    font-weight: 500;
    color: var(--highlight);
    max-width: 1100px;
    text-shadow: 0 2px 30px rgba(255, 213, 74, 0.2);
    word-break: keep-all;
  }
  .karaoke-current.ko { font-family: 'Nanum Myeongjo', serif; font-weight: 700; }
  .karaoke-prev.ko, .karaoke-next.ko { font-family: 'Nanum Myeongjo', serif; }

  .karaoke-verse-num {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.28em;
    color: var(--accent);
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .karaoke-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, #0e0b08 70%, rgba(14,11,8,0));
    z-index: 6;
  }
  .karaoke-progress {
    max-width: 1100px;
    width: 100%;
    margin: 0 auto 8px;
    height: 5px;
    background: var(--rule);
    border-radius: 2px;
    overflow: hidden;
  }
  .karaoke-progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s;
  }
  .karaoke-hint {
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }
  .karaoke-hint kbd {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    color: var(--text);
    margin: 0 2px;
  }
  @media (max-width: 600px) { .karaoke-hint { display: none; } }

  .footer-note {
    margin-top: 40px;
    text-align: center;
    font-size: 13px;
    color: var(--text-faint);
    font-style: italic;
    padding: 0 12px;
  }

  ::-webkit-scrollbar { width: 12px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header class="masthead">
    <div class="ornament" aria-hidden="true">✦ · ✦ · ✦</div>
    <h1 class="title">Lectio</h1>
    <p class="subtitle">A quiet place to read scripture <span class="ko">· 성경 낭독</span></p>
  </header>

  <section class="controls" aria-label="Passage selection">
    <div class="field">
      <label id="lang-label">Language</label>
      <div class="lang-toggle" id="langToggle" role="group" aria-labelledby="lang-label">
        <button data-lang="en" class="active" aria-pressed="true" type="button">English</button>
        <button data-lang="ko" aria-pressed="false" type="button">한국어</button>
      </div>
    </div>

    <div class="field full">
      <label for="translationSelect">Translation</label>
      <select id="translationSelect"></select>
    </div>

    <div class="field full">
      <label for="bookSelect">Book</label>
      <select id="bookSelect"></select>
    </div>

    <div class="field">
      <label for="chapterInput">Chapter</label>
      <input type="number" id="chapterInput" value="1" min="1" inputmode="numeric" />
    </div>

    <div class="field">
      <label for="verseInput">Start at verse</label>
      <input type="number" id="verseInput" value="1" min="1" inputmode="numeric" />
    </div>

    <button class="load-btn" id="loadBtn" type="button">Read</button>
  </section>

  <section class="settings" aria-label="Display and voice settings">
    <div class="field">
      <label>Narrator</label>
      <div class="voice-toggle" id="voiceToggle" role="group" aria-label="Narrator voice">
        <button data-voice="male" class="active" aria-pressed="true" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>
          Male
        </button>
        <button data-voice="female" aria-pressed="false" type="button">

<script>
/* ──────────────────────────────────────────────────────
   Translations available from each source
   English: bible-api.com supports translation= parameter
   Korean: bolls.life serves KRV (개역한글); we offer it
   as the primary, with a note. NKRV (개역개정) and 새번역
   are copyrighted so not freely available via these APIs.
─────────────────────────────────────────────────────── */
const EN_TRANSLATIONS = [
  { id: "kjv",  name: "King James Version (KJV)" },
  { id: "web",  name: "World English Bible (WEB)" },
  { id: "asv",  name: "American Standard Version (ASV)" },
  { id: "bbe",  name: "Bible in Basic English (BBE)" },
  { id: "ylt",  name: "Young's Literal Translation (YLT)" },
  { id: "oeb-cw", name: "Open English Bible, Commonwealth" },
  { id: "webbe", name: "World English Bible, British" },
];

const KO_TRANSLATIONS = [
  { id: "KRV",   name: "개역한글 · Korean Revised (1961)" },
  { id: "YKRV",  name: "개역한글 (대체) · alternate edition" },
];

/* ──────────────────────────────────────────────────────
   Books — split into OT / NT
   [English, Korean, api-slug, chapter count]
─────────────────────────────────────────────────────── */
const OT = [
  ["Genesis","창세기","genesis",50],["Exodus","출애굽기","exodus",40],
  ["Leviticus","레위기","leviticus",27],["Numbers","민수기","numbers",36],
  ["Deuteronomy","신명기","deuteronomy",34],["Joshua","여호수아","joshua",24],
  ["Judges","사사기","judges",21],["Ruth","룻기","ruth",4],
  ["1 Samuel","사무엘상","1 samuel",31],["2 Samuel","사무엘하","2 samuel",24],
  ["1 Kings","열왕기상","1 kings",22],["2 Kings","열왕기하","2 kings",25],
  ["1 Chronicles","역대상","1 chronicles",29],["2 Chronicles","역대하","2 chronicles",36],
  ["Ezra","에스라","ezra",10],["Nehemiah","느헤미야","nehemiah",13],
  ["Esther","에스더","esther",10],["Job","욥기","job",42],
  ["Psalms","시편","psalms",150],["Proverbs","잠언","proverbs",31],
  ["Ecclesiastes","전도서","ecclesiastes",12],["Song of Solomon","아가","song of solomon",8],
  ["Isaiah","이사야","isaiah",66],["Jeremiah","예레미야","jeremiah",52],
  ["Lamentations","예레미야애가","lamentations",5],["Ezekiel","에스겔","ezekiel",48],
  ["Daniel","다니엘","daniel",12],["Hosea","호세아","hosea",14],
  ["Joel","요엘","joel",3],["Amos","아모스","amos",9],
  ["Obadiah","오바댜","obadiah",1],["Jonah","요나","jonah",4],
  ["Micah","미가","micah",7],["Nahum","나훔","nahum",3],
  ["Habakkuk","하박국","habakkuk",3],["Zephaniah","스바냐","zephaniah",3],
  ["Haggai","학개","haggai",2],["Zechariah","스가랴","zechariah",14],
  ["Malachi","말라기","malachi",4],
];

const NT = [
  ["Matthew","마태복음","matthew",28],["Mark","마가복음","mark",16],
  ["Luke","누가복음","luke",24],["John","요한복음","john",21],
  ["Acts","사도행전","acts",28],["Romans","로마서","romans",16],
  ["1 Corinthians","고린도전서","1 corinthians",16],["2 Corinthians","고린도후서","2 corinthians",13],
  ["Galatians","갈라디아서","galatians",6],["Ephesians","에베소서","ephesians",6],
  ["Philippians","빌립보서","philippians",4],["Colossians","골로새서","colossians",4],
  ["1 Thessalonians","데살로니가전서","1 thessalonians",5],["2 Thessalonians","데살로니가후서","2 thessalonians",3],
  ["1 Timothy","디모데전서","1 timothy",6],["2 Timothy","디모데후서","2 timothy",4],
  ["Titus","디도서","titus",3],["Philemon","빌레몬서","philemon",1],
  ["Hebrews","히브리서","hebrews",13],["James","야고보서","james",5],
  ["1 Peter","베드로전서","1 peter",5],["2 Peter","베드로후서","2 peter",3],
  ["1 John","요한일서","1 john",5],["2 John","요한이서","2 john",1],
  ["3 John","요한삼서","3 john",1],["Jude","유다서","jude",1],
  ["Revelation","요한계시록","revelation",22],
];

const ALL_BOOKS = [...OT, ...NT];
const SIZE_MAP = { md: 21, lg: 28, xl: 36 };

const state = {
  lang: "en",
  bookIdx: 18,
  chapter: 23,
  startVerse: 1,
  verses: [],
  currentVerse: -1,
  playing: false,
  rate: 0.95,
  size: "md",
  gender: "male",
  translation: "web",  // default English
  translationKo: "KRV",
};

const $ = (id) => document.getElementById(id);
const bookSelect       = $("bookSelect");
const translationSelect= $("translationSelect");
const chapterInput     = $("chapterInput");
const verseInput       = $("verseInput");
const loadBtn          = $("loadBtn");
const reading          = $("reading");
const langToggle       = $("langToggle");
const voiceToggle      = $("voiceToggle");
const testVoiceBtn     = $("testVoiceBtn");
const player           = $("player");
const playerPassage    = $("playerPassage");
const playerStatus     = $("playerStatus");
const playBtn          = $("playBtn");
const playIcon         = $("playIcon");
const pauseIcon        = $("pauseIcon");
const stopBtn          = $("stopBtn");
const prevBtn          = $("prevBtn");
const nextBtn          = $("nextBtn");
const karaokeBtn       = $("karaokeBtn");
const speedSlider      = $("speedSlider");
const speedVal         = $("speedVal");
const karaoke          = $("karaoke");
const karaokeClose     = $("karaokeClose");
const karaokeTitle     = $("karaokeTitle");
const karaokePrev      = $("karaokePrev");
const karaokeNext      = $("karaokeNext");
const karaokeCurrent   = $("karaokeCurrent");
const karaokeText      = $("karaokeText");
const karaokeVerseNum  = $("karaokeVerseNum");
const karaokeProgress  = $("karaokeProgress");
const karaokeInner     = document.querySelector(".karaoke-inner");

function applySize() {
  document.documentElement.style.setProperty("--reading-size", SIZE_MAP[state.size] + "px");
}
applySize();

/* ──────────── Populate selects ──────────── */
function fillTranslations() {
  translationSelect.innerHTML = "";
  const list = state.lang === "ko" ? KO_TRANSLATIONS : EN_TRANSLATIONS;
  list.forEach(t => {
    const o = document.createElement("option");
    o.value = t.id; o.textContent = t.name;
    translationSelect.appendChild(o);
  });
  state.translation   = state.lang === "ko" ? state.translationKo : (state.translation || "web");
  translationSelect.value = state.lang === "ko" ? state.translationKo : state.translation;
  translationSelect.style.fontFamily = state.lang === "ko"
    ? "'Nanum Myeongjo', serif"
    : "'Cormorant Garamond', serif";
}

function fillBooks() {
  bookSelect.innerHTML = "";
  const mkGroup = (label, list, offset) => {
    const og = document.createElement("optgroup");
    og.label = label;
    list.forEach((b, i) => {
      const opt = document.createElement("option");
      opt.value = offset + i;
      opt.textContent = state.lang === "ko" ? b[1] : b[0];
      og.appendChild(opt);
    });
    return og;
  };
  bookSelect.appendChild(mkGroup(
    state.lang === "ko" ? "구약 · Old Testament" : "Old Testament", OT, 0));
  bookSelect.appendChild(mkGroup(
    state.lang === "ko" ? "신약 · New Testament" : "New Testament", NT, OT.length));
  bookSelect.value = state.bookIdx;
  bookSelect.style.fontFamily = state.lang === "ko"
    ? "'Nanum Myeongjo', serif"
    : "'Cormorant Garamond', serif";
  chapterInput.max = ALL_BOOKS[state.bookIdx][3];
}

/* ──────────── Event listeners ──────────── */
langToggle.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-lang]");
  if (!btn) return;
  langToggle.querySelectorAll("button").forEach(b => {
    b.classList.remove("active");
    b.setAttribute("aria-pressed", "false");
  });
  btn.classList.add("active");
  btn.setAttribute("aria-pressed", "true");
  state.lang = btn.dataset.lang;
  fillTranslations();
  fillBooks();
  stopSpeech();
});

translationSelect.addEventListener("change", () => {
  if (state.lang === "ko") state.translationKo = translationSelect.value;
  else state.translation = translationSelect.value;
});

voiceToggle.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-voice]");
  if (!btn) return;
  voiceToggle.querySelectorAll("button").forEach(b => {
    b.classList.remove("active");
    b.setAttribute("aria-pressed", "false");
  });
  btn.classList.add("active");
  btn.setAttribute("aria-pressed", "true");
  state.gender = btn.dataset.voice;
  if (state.playing && state.currentVerse >= 0) {
    stopAudio();
    speakCurrent();
  }
});

testVoiceBtn.addEventListener("click", () => {
  if (!SPEECH_OK) return;
  stopAudio();
  const sample = state.lang === "ko"
    ? "여호와는 나의 목자시니 내게 부족함이 없으리로다"
    : "The Lord is my shepherd; I shall not want.";
  const utter = new SpeechSynthesisUtterance(sample);
  const v = pickVoice();
  if (v) utter.voice = v;
  utter.lang = state.lang === "ko" ? "ko-KR" : "en-US";
  utter.rate = state.rate;
  utter.pitch = state.gender === "female" ? 1.25 : 0.75;
  synth.speak(utter);
});

bookSelect.addEventListener("change", () => {
  state.bookIdx = parseInt(bookSelect.value, 10);
  chapterInput.max = ALL_BOOKS[state.bookIdx][3];
  if (parseInt(chapterInput.value,10) > ALL_BOOKS[state.bookIdx][3]) {
    chapterInput.value = 1;
  }
});

loadBtn.addEventListener("click", loadPassage);
[chapterInput, verseInput].forEach(el => {
  el.addEventListener("keypress", (e) => { if (e.key === "Enter") loadPassage(); });
});

document.querySelectorAll(".size-btn[data-size]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".size-btn[data-size]").forEach(b => {
      b.classList.remove("active");
      b.setAttribute("aria-pressed", "false");
    });
    btn.classList.add("active");
    btn.setAttribute("aria-pressed", "true");
    state.size = btn.dataset.size;
    applySize();
  });
});

/* ──────────── Fetch passages ──────────── */
async function loadPassage() {
  stopSpeech();
  const book = ALL_BOOKS[state.bookIdx];
  const ch = Math.max(1, Math.min(parseInt(chapterInput.value,10) || 1, book[3]));
  const sv = Math.max(1, parseInt(verseInput.value,10) || 1);
  state.chapter = ch;
  state.startVerse = sv;
  chapterInput.value = ch;

  reading.innerHTML = `<div class="loading">Gathering the passage…</div>`;

  try {
    let verses;
    if (state.lang === "en") verses = await fetchEnglish(book[2], ch, state.translation);
    else verses = await fetchKorean(state.bookIdx, ch, state.translationKo);
    if (!verses.length) throw new Error("empty");
    state.verses = verses;
    const maxV = verses[verses.length-1].n;
    if (sv > maxV) { state.startVerse = 1; verseInput.value = 1; }
    renderPassage();
    showPlayer();
  } catch (err) {
    console.error(err);
    reading.innerHTML = `<div class="empty">
      <div class="ornament-lg" aria-hidden="true">⸻</div>
      <p>Unable to load this passage right now.<br/>Please try again or pick another translation.</p>
    </div>`;
  }
}

async function fetchEnglish(slug, ch, translation) {
  const ref = encodeURIComponent(`${slug} ${ch}`);
  const url = `https://bible-api.com/${ref}?translation=${encodeURIComponent(translation)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("English fetch failed: " + res.status);
  const data = await res.json();
  return data.verses.map(v => ({ n: v.verse, text: v.text.trim() }));
}

async function fetchKorean(bookIdx, ch, translation) {
  const bookNum = bookIdx + 1;
  const tryList = [translation, "KRV", "YKRV"];
  for (const key of tryList) {
    try {
      const res = await fetch(`https://bolls.life/get-text/${key}/${bookNum}/${ch}/`);
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data) && data.length) {
          return data.map(v => ({ n: v.verse, text: (v.text||"").replace(/<[^>]+>/g,"").trim() }));
        }
      }
    } catch {}
  }
  throw new Error("Korean fetch failed");
}

/* ──────────── Render ──────────── */
function renderPassage() {
  const book = ALL_BOOKS[state.bookIdx];
  const titleText = state.lang === "ko"
    ? `${book[1]} ${state.chapter}장`
    : `${book[0]} ${state.chapter}`;
  const cls = state.lang === "ko" ? "ko" : "";

  const versesHtml = state.verses.map((v, i) => `
    <div class="verse" data-i="${i}" tabindex="0" role="button" aria-label="Verse ${v.n}">
      <span class="verse-num" aria-hidden="true">${v.n}</span><span class="verse-text">${escapeHtml(v.text)}</span>
    </div>
  `).join("");

  const transLabel = state.lang === "ko"
    ? (KO_TRANSLATIONS.find(t => t.id === state.translationKo)?.name.split(" · ")[0] || "")
    : (EN_TRANSLATIONS.find(t => t.id === state.translation)?.name.match(/\(([^)]+)\)/)?.[1] || state.translation.toUpperCase());

  reading.innerHTML = `
    <div class="passage-header">
      <h2 class="passage-title ${cls}">${titleText}</h2>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span class="passage-meta">${transLabel}</span>
        <button class="fullscreen-btn" id="openKaraoke" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
          Reading Mode
        </button>
      </div>
    </div>
    <div class="verses ${cls}">${versesHtml}</div>
  `;

  reading.querySelectorAll(".verse").forEach(el => {
    const startHere = () => {
      state.currentVerse = parseInt(el.dataset.i, 10);
      speakCurrent();
    };
    el.addEventListener("click", startHere);
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); startHere(); }
    });
  });

  $("openKaraoke").addEventListener("click", openKaraoke);

  playerPassage.textContent = `${titleText} : ${state.startVerse}`;
  playerPassage.classList.toggle("ko", state.lang === "ko");
  playerStatus.textContent = "Ready";

  state.currentVerse = findIndexByVerseNum(state.startVerse);
  if (state.currentVerse >= 0) highlightVerse(state.currentVerse, false);
}

function findIndexByVerseNum(n) {
  const i = state.verses.findIndex(v => v.n >= n);
  return i < 0 ? 0 : i;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ──────────── Voices ──────────── */
const synth = (typeof window !== "undefined" && window.speechSynthesis) ? window.speechSynthesis : null;
const SPEECH_OK = !!synth;
let voices = [];

function refreshVoices() {
  if (!synth) return;
  try { voices = synth.getVoices() || []; } catch { voices = []; }
}

if (synth) {
  refreshVoices();
  if ("onvoiceschanged" in synth) synth.addEventListener("voiceschanged", refreshVoices);
  let tries = 0;
  const poll = setInterval(() => {
    tries++;
    refreshVoices();
    if (voices.length || tries > 20) clearInterval(poll);
  }, 200);
}

/* Known voice names by gender across platforms.
   Female names are checked FIRST because most default voices are female. */
const FEMALE_NAMES = [
  "female","woman","samantha","victoria","karen","moira","tessa","fiona",
  "allison","ava","susan","zira","hazel","heera","catherine","amelie","aria",
  "jenny","nova","kyoko","yuna","sora","seoyeon","sun-hi","sun hi","sinji","sin-ji",
  "mei","heami","selma","milena","ellen","veena","rishi","carmit","luciana",
  "kanya","nora","emily","jessa","libby","clara","mia","linda","sara"
];
const MALE_NAMES = [
  "male","man","alex","daniel","fred","tom","david","mark","james","george",
  "guy","brian","aaron","matthew","hyunsu","inho","minsang","minsoo","bongjin",
  "ryan","liam","oliver","william","ethan","aidan","reed","arthur","henry"
];

function classifyVoice(v) {
  const n = (v.name || "").toLowerCase();
  for (const fn of FEMALE_NAMES) if (n.includes(fn)) return "female";
  for (const mn of MALE_NAMES) if (n.includes(mn)) return "male";
  return "unknown";
}

function pickVoice() {
  if (!voices.length) return null;
  const target = state.lang === "ko" ? "ko" : "en";
  const matching = voices.filter(v => (v.lang || "").toLowerCase().startsWith(target));
  if (!matching.length) return null;

  // Pass 1: explicit match
  const exact = matching.find(v => classifyVoice(v) === state.gender);
  if (exact) return exact;

  // Pass 2: anything not classified as the opposite gender
  const opp = state.gender === "male" ? "female" : "male";
  const safe = matching.find(v => classifyVoice(v) !== opp);
  if (safe) return safe;

  // Last resort
  return matching[0];
}

/* ──────────── Playback ──────────── */
function speakCurrent() {
  if (!state.verses.length) return;
  if (state.currentVerse < 0) state.currentVerse = 0;
  if (state.currentVerse >= state.verses.length) { finishReading(); return; }
  stopAudio();

  const v = state.verses[state.currentVerse];
  highlightVerse(state.currentVerse, true);
  updateKaraokeView();

  state.playing = true;
  updatePlayUI();
  playerStatus.textContent = state.lang === "ko"
    ? `${v.n}절 낭독중`
    : `Verse ${v.n}`;

  if (!SPEECH_OK) {
    playerStatus.textContent = "Audio unavailable";
    state.playing = false;
    updatePlayUI();
    return;
  }

  const utter = new SpeechSynthesisUtterance(v.text);
  const voice = pickVoice();
  if (voice) utter.voice = voice;
  utter.lang = state.lang === "ko" ? "ko-KR" : "en-US";
  utter.rate = state.rate;
  // Stronger pitch contrast — last-resort gender cue when only one voice is installed.
  utter.pitch = state.gender === "female" ? 1.25 : 0.75;

  utter.onend = () => {
    if (state.playing) {
      state.currentVerse += 1;
      if (state.currentVerse < state.verses.length) speakCurrent();
      else finishReading();
    }
  };
  utter.onerror = () => finishReading();
  synth.speak(utter);
}

function stopAudio() {
  if (synth) { try { synth.cancel(); } catch {} }
}

/* Highlight a verse and auto-scroll BOTH the main view and reading mode. */
function highlightVerse(i, autoscroll=true) {
  reading.querySelectorAll(".verse").forEach(el => el.classList.remove("active"));
  const el = reading.querySelector(`.verse[data-i="${i}"]`);
  if (el) {
    el.classList.add("active");
    if (autoscroll && !karaoke.classList.contains("active")) {
      // Scroll the page so the active verse is in view, accounting for the fixed player.
      const rect = el.getBoundingClientRect();
      const playerH = player.offsetHeight + 20;
      const viewH = window.innerHeight - playerH;
      if (rect.top < 80 || rect.bottom > viewH) {
        const y = window.scrollY + rect.top - (viewH / 2 - rect.height / 2);
        window.scrollTo({ top: y, behavior: "smooth" });
      }
    }
  }
  // If reading mode is open, scroll its inner container to keep current verse centered
  if (autoscroll && karaoke.classList.contains("active")) {
    requestAnimationFrame(() => {
      const cur = $("karaokeCurrent");
      if (!cur) return;
      const rect = cur.getBoundingClientRect();
      const targetY = karaoke.scrollTop + rect.top - (window.innerHeight / 2 - rect.height / 2);
      karaoke.scrollTo({ top: Math.max(0, targetY), behavior: "smooth" });
    });
  }
}

function finishReading() {
  state.playing = false;
  state.currentVerse = -1;
  reading.querySelectorAll(".verse").forEach(el => el.classList.remove("active"));
  updatePlayUI();
  playerStatus.textContent = state.lang === "ko" ? "끝" : "Finished";
  updateKaraokeView(true);
}

function stopSpeech() {
  stopAudio();
  state.playing = false;
  state.currentVerse = -1;
  reading.querySelectorAll(".verse").forEach(el => el.classList.remove("active"));
  updatePlayUI();
  if (state.verses.length) playerStatus.textContent = "Ready";
}

function updatePlayUI() {
  playIcon.style.display = state.playing ? "none" : "block";
  pauseIcon.style.display = state.playing ? "block" : "none";
  playBtn.setAttribute("aria-label", state.playing ? "Pause" : "Play");
}

function showPlayer() { player.classList.add("visible"); }

/* ──────────── Player controls ──────────── */
playBtn.addEventListener("click", () => {
  if (!state.verses.length) return;
  if (state.playing) {
    if (synth) try { synth.pause(); } catch {}
    state.playing = false;
    updatePlayUI();
    playerStatus.textContent = state.lang === "ko" ? "일시정지" : "Paused";
  } else if (synth && synth.paused && synth.speaking) {
    synth.resume();
    state.playing = true;
    updatePlayUI();
  } else {
    if (state.currentVerse < 0) state.currentVerse = findIndexByVerseNum(state.startVerse);
    speakCurrent();
  }
});

stopBtn.addEventListener("click", stopSpeech);

prevBtn.addEventListener("click", () => {
  if (!state.verses.length) return;
  state.currentVerse = Math.max(0, (state.currentVerse < 0 ? 0 : state.currentVerse) - 1);
  state.playing = true;
  speakCurrent();
});

nextBtn.addEventListener("click", () => {
  if (!state.verses.length) return;
  state.currentVerse = Math.min(state.verses.length - 1, (state.currentVerse < 0 ? -1 : state.currentVerse) + 1);
  state.playing = true;
  speakCurrent();
});

speedSlider.addEventListener("input", () => {
  state.rate = parseFloat(speedSlider.value);
  speedVal.textContent = state.rate.toFixed(2) + "×";
  if (SPEECH_OK && state.playing && state.currentVerse >= 0) {
    try { synth.cancel(); } catch {}
    speakCurrent();
  }
});

/* ──────────── Fullscreen ──────────── */
karaokeBtn.addEventListener("click", openKaraoke);
karaokeClose.addEventListener("click", closeKaraoke);

function openKaraoke() {
  if (!state.verses.length) return;
  karaoke.classList.add("active");
  document.body.classList.add("karaoke-open");
  const book = ALL_BOOKS[state.bookIdx];
  karaokeTitle.textContent = state.lang === "ko"
    ? `${book[1]} ${state.chapter}장`
    : `${book[0]} ${state.chapter}`;
  karaokeTitle.classList.toggle("ko", state.lang === "ko");
  karaokeCurrent.classList.toggle("ko", state.lang === "ko");
  karaokePrev.classList.toggle("ko", state.lang === "ko");
  karaokeNext.classList.toggle("ko", state.lang === "ko");
  updateKaraokeView();
}
function closeKaraoke() {
  karaoke.classList.remove("active");
  document.body.classList.remove("karaoke-open");
}
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && karaoke.classList.contains("active")) closeKaraoke();
  if (karaoke.classList.contains("active")) {
    if (e.key === "ArrowRight") nextBtn.click();
    if (e.key === "ArrowLeft") prevBtn.click();
    if (e.key === " ") { e.preventDefault(); playBtn.click(); }
  }
});

function updateKaraokeView(finished=false) {
  if (!karaoke.classList.contains("active")) return;
  const i = state.currentVerse;
  if (finished || i < 0 || i >= state.verses.length) {
    karaokeVerseNum.textContent = "✦";
    karaokeText.textContent = state.lang === "ko" ? "끝" : "End of passage";
    karaokePrev.textContent = "";
    karaokeNext.textContent = "";
    karaokeProgress.style.width = "100%";
    return;
  }
  const cur = state.verses[i];
  karaokeVerseNum.textContent = state.lang === "ko" ? `${cur.n} 절` : `Verse ${cur.n}`;
  karaokeText.textContent = cur.text;
  karaokePrev.textContent = i > 0 ? state.verses[i-1].text : "";
  karaokeNext.textContent = i < state.verses.length - 1 ? state.verses[i+1].text : "";
  karaokeProgress.style.width = ((i+1) / state.verses.length * 100) + "%";
}

/* ──────────── Init ──────────── */
fillTranslations();
fillBooks();
chapterInput.value = state.chapter;
verseInput.value = state.startVerse;

if (!SPEECH_OK) {
  const note = document.createElement("div");
  note.className = "info-note";
  note.innerHTML = "Audio playback is not available in this view. Open this page in a regular browser tab to hear the reading.";
  document.querySelector(".settings").after(note);
}
</script>
</body>
</html>
